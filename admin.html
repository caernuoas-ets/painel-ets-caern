<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Obras - CAERN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a href="index.html">📺 Ver Dashboard (TV)</a>
    </div>

    <h1>⚙️ Gerenciar Quadros</h1>

    <div class="admin-section">
        <h2>1. Adicionar Novo Encarregado</h2>
        <form id="formEncarregado">
            <input type="text" id="nomeEncarregado" placeholder="Nome do Encarregado (ex: João Silva)" required>
            <button type="submit">Criar Quadro</button>
        </form>
    </div>

    <div class="admin-section">
        <h2>2. Atribuir / Editar Frente de Trabalho (Obra)</h2>
        <form id="formServico">
            <select id="selectEncarregado" required>
                </select>
            <input type="text" id="nomeServico" placeholder="Serviço (ex: Retirada de porta)" required>
            <input type="text" id="nomeLocal" placeholder="Local (ex: Poço P-12, EEE Tirol)" required>
            
            <label for="dataLocal" style="font-size: 0.85rem; color: #787774; margin-top: 0.5rem; display: block;">Data de Início/Registro:</label>
            <input type="date" id="dataLocal" required>
            
            <select id="statusLocal">
                <option value="Iniciar">A Iniciar</option>
                <option value="Execucao">Em Execução</option>
                <option value="Parada">Parada</option>
            </select>
            <input type="text" id="notaLocal" placeholder="Observação (opcional)">
            <button type="submit" id="btnSubmitServico">Adicionar Obra</button>
        </form>
    </div>

    <div class="admin-section">
        <h2>3. Editar / Remover Frentes Atuais</h2>
        <div id="listaAdmin">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
