<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFT - Painel de gerenciamento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚧</text></svg>">
</head>
<body>
    <div class="nav">
        <div class="nav-left">
            <button class="btn-theme" onclick="alternarTema()" id="btnTheme" title="Modo Noturno/Claro">🌙</button>
            <a href="index.html">📺 Ver Dashboard </a>
            <a href="mapa.html">🗺️ Ver Mapeamento </a>
        </div>
        <button class="btn-excel" onclick="exportarExcel()">📥 Exportar Excel</button>
    </div>

    <h1>⚙️ Gerenciar Quadros</h1>

    <div class="admin-section">
        <h2>1. Adicionar Novo Encarregado</h2>
        <form id="formEncarregado">
            <input type="text" id="nomeEncarregado" placeholder="Nome do Encarregado" required>
            <button type="submit">Criar Quadro</button>
        </form>
    </div>

    <div class="admin-section">
        <h2>2. Atribuir / Editar Frente de Trabalho (Obra)</h2>
        <form id="formServico">
            <select id="selectEncarregado" required></select>
            <input type="text" id="nomeServico" placeholder="Serviço (ex: Demolição, Chapisco)" required>
            
            <input type="text" id="nomeLocal" placeholder="Local" required>
            
            <label for="selectCoordenada" style="font-size: 0.85rem; color: #787774; margin-top: 0.5rem; display: block;">📍 Vincular ao Mapa (Opcional):</label>
            <input type="text" id="buscaCoordenada" placeholder="🔍 Filtrar lista de locais..." onkeyup="preencherSelectCoordenadas()" style="margin-bottom: 5px;">
            <select id="selectCoordenada">
                <option value="">Não vincular a nenhum ponto no mapa</option>
                </select>
            
            <label for="dataLocal" style="font-size: 0.85rem; color: #787774; margin-top: 0.5rem; display: block;">Data de Início/Registro:</label>
            <input type="date" id="dataLocal" required>
            
            <select id="statusLocal">
                <option value="Iniciar">A Iniciar</option>
                <option value="Execucao">Em Execução</option>
                <option value="Parada">Parada</option>
            </select>
            <input type="text" id="notaLocal" placeholder="Observação (opcional)">
            
            <label class="checkbox-container">
                <input type="checkbox" id="urgenciaLocal">
                🚨 Marcar como Urgência (Fica no topo)
            </label>

            <button type="submit" id="btnSubmitServico">Adicionar Obra</button>
        </form>
    </div>

    <div class="admin-section">
        <h2>3. Editar / Remover Frentes Atuais</h2>
        <div class="busca-container">
            <input type="text" id="buscaAdmin" placeholder="🔍 Buscar por Local ou Serviço..." onkeyup="renderizarAdmin()">
        </div>
        <div id="listaAdmin"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
    <footer style="text-align: center; padding: 20px; color: #787774; font-size: 0.85rem; margin-top: 2rem; border-top: 1px solid #e9e9e7;">
    GFT v3.1 © 2026 | Desenvolvido por Kauã Carlos - @kauacsilva.
</footer>
</body>
</html>
