<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFT - Mapeamento das frentes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #f7f7f5; --card-bg: #ffffff; --text-main: #37352f;
            --text-muted: #787774; --border: #e9e9e7; --popup-bg: #f9f9f8;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        body.dark-mode {
            --bg-color: #191919; --card-bg: #2d2d2d; --text-main: #f5f5f5;
            --text-muted: #a0a0a0; --border: #404040; --popup-bg: #333333;
            --panel-bg: rgba(45, 45, 45, 0.95);
        }

        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); overflow: hidden; color: var(--text-main); }
        
        .painel-flutuante {
            position: absolute; top: 15px; left: 50px; right: 15px; max-width: 700px;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            padding: 1rem 1.5rem; border-radius: 8px; border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .linha-topo { display: flex; justify-content: space-between; align-items: center; }
        .titulo-container { display: flex; align-items: center; gap: 12px; }
        .btn-voltar { text-decoration: none; font-size: 1.2rem; transition: transform 0.2s; border-right: 1px solid var(--border); padding-right: 12px; }
        .btn-voltar:hover { transform: scale(1.2); }
        .painel-flutuante h1 { margin: 0; font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        
        .controles-direita { display: flex; align-items: center; gap: 15px; }
        .btn-theme-mapa { background: none; border: none; font-size: 1.3rem; cursor: pointer; transition: transform 0.2s; padding: 0; }
        .btn-theme-mapa:hover { transform: scale(1.1); }
        .status-banco { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; background: var(--bg-color); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);}

        /* Novos Filtros */
        .linha-filtros { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .linha-filtros select { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 0.9rem; outline: none;}

        #meuMapa { height: 100vh; width: 100vw; z-index: 1; position: absolute; top: 0; left: 0;}

        /* Pinos */
        .icone-pino { border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: transform 0.2s ease; }
        .icone-pino:hover { transform: scale(1.4); z-index: 1000 !important; cursor: pointer; }
        .pino-cinza { background-color: #b3b3b3; opacity: 0.8;} 
        .pino-iniciar { background-color: #d9730d; box-shadow: 0 0 10px rgba(217, 115, 13, 0.6);} 
        .pino-execucao { background-color: #0f7b6c; box-shadow: 0 0 10px rgba(15, 123, 108, 0.6);} 
        .pino-parada { background-color: #e03e3e; box-shadow: 0 0 10px rgba(224, 62, 62, 0.6); animation: pulsar 2s infinite;} 

        @keyframes pulsar { 0% { box-shadow: 0 0 0 0 rgba(224, 62, 62, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(224, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(224, 62, 62, 0); } }

        /* Popup */
        .leaflet-popup-content-wrapper { background: var(--card-bg); color: var(--text-main); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 0; }
        .leaflet-popup-tip { background: var(--card-bg); }
        .leaflet-popup-content { margin: 0; }
        .popup-gft { padding: 15px; min-width: 220px; }
        .popup-titulo { font-size: 1.1rem; font-weight: 600; margin: 0 0 5px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .popup-sistema { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin: 0; padding-top: 5px; }
        .popup-obra { margin-top: 10px; background: var(--popup-bg); padding: 8px; border-radius: 4px; border-left: 3px solid var(--border); }
    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚧</text></svg>">
</head>
<body>
    
    <div class="painel-flutuante">
        <div class="linha-topo">
            <div class="titulo-container">
                <a href="index.html" class="btn-voltar" title="Voltar ao Dashboard">⬅️</a>
                <h1>🗺️ GFT - Mapeamento das frentes </h1>
            </div>
            <div class="controles-direita">
                <button class="btn-theme-mapa" onclick="alternarTemaMapa()" id="btnThemeMapa" title="Alternar Modo Escuro">🌙</button>
                <div class="status-banco" id="contadorLocais">Conectando...</div>
            </div>
        </div>
        
        <div class="linha-filtros">
            <select id="filtroVisibilidade" onchange="renderizarMapa()">
                <option value="Todos">Mostrar tudo</option>
                <option value="ApenasObras">Ocultar locais sem serviço</option>
            </select>
            <select id="filtroEncarregado" onchange="renderizarMapa()">
                <option value="Todos">Todos os Encarregados</option>
                </select>
        </div>
    </div>

    <div id="meuMapa"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvj-9BlmWy2EpSC-XSFhOGOnqrQ8JYB3E",
            authDomain: "painel-ets.firebaseapp.com",
            databaseURL: "https://painel-ets-default-rtdb.firebaseio.com", 
            projectId: "painel-ets"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Mapa focado na Arena das Dunas (Excluindo ZN)
        const mapa = L.map('meuMapa', { zoomControl: false }).setView([-5.827, -35.212], 13); 
        L.control.zoom({ position: 'bottomright' }).addTo(mapa); 
        
        let camadaAtualMapa;
        const linkClaro = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
        const linkEscuro = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

        function aplicarTemaMapa(isDark) {
            if (camadaAtualMapa) { mapa.removeLayer(camadaAtualMapa); }
            camadaAtualMapa = L.tileLayer(isDark ? linkEscuro : linkClaro, { attribution: '© OpenStreetMap | © CARTO' }).addTo(mapa);
            if (isDark) { document.body.classList.add('dark-mode'); document.getElementById('btnThemeMapa').innerText = '☀️'; } 
            else { document.body.classList.remove('dark-mode'); document.getElementById('btnThemeMapa').innerText = '🌙'; }
        }

        function alternarTemaMapa() {
            const isDark = !document.body.classList.contains('dark-mode');
            localStorage.setItem('temaCaern', isDark ? 'escuro' : 'claro'); 
            aplicarTemaMapa(isDark);
        }

        const temaSalvo = localStorage.getItem('temaCaern') === 'escuro';
        aplicarTemaMapa(temaSalvo);

        let marcadoresLayer = L.layerGroup().addTo(mapa);
        let baseLocais = {};
        let obrasAtivas = {};

        db.ref('cardapioCoordenadas').on('value', (snapshot) => { baseLocais = snapshot.val() || {}; renderizarMapa(); });
        db.ref('obrasCaern').on('value', (snapshot) => { 
            obrasAtivas = snapshot.val() || {}; 
            atualizarListaEncarregados();
            renderizarMapa(); 
        });

        // Alimenta a lista suspensa de encarregados no mapa
        function atualizarListaEncarregados() {
            const select = document.getElementById('filtroEncarregado');
            const valorAtual = select.value;
            select.innerHTML = '<option value="Todos">Todos os Encarregados</option>';
            for (let encarregado in obrasAtivas) {
                select.innerHTML += `<option value="${encarregado}">${encarregado}</option>`;
            }
            select.value = valorAtual; // Mantém a seleção se houver
        }

        function renderizarMapa() {
            marcadoresLayer.clearLayers();
            const visibilidade = document.getElementById('filtroVisibilidade').value;
            const filtroEnc = document.getElementById('filtroEncarregado').value;
            
            let contadorMapeados = 0;
            let contadorMostrados = 0;

            for (let idLocal in baseLocais) {
                const local = baseLocais[idLocal];
                contadorMapeados++;
                let servicosDesteLocal = [];

                // Puxa as obras, respeitando o filtro de encarregado
                for (let encarregado in obrasAtivas) {
                    if (filtroEnc !== 'Todos' && encarregado !== filtroEnc) continue;

                    obrasAtivas[encarregado].forEach(obra => {
                        if (obra.dummy) return;
                        if (obra.coordId === idLocal) {
                            servicosDesteLocal.push({ ...obra, encarregado }); 
                        }
                    });
                }

                // Lógica do filtro de visibilidade (Limpar tela)
                if (visibilidade === 'ApenasObras' && servicosDesteLocal.length === 0) {
                    continue; // Pula o desenho deste pino
                }

                let classeCor = 'pino-cinza'; 
                let temParada = servicosDesteLocal.some(s => s.status === 'Parada');
                let temExecucao = servicosDesteLocal.some(s => s.status === 'Execucao');
                let temIniciar = servicosDesteLocal.some(s => s.status === 'Iniciar');

                if (temParada) classeCor = 'pino-parada';
                else if (temExecucao) classeCor = 'pino-execucao';
                else if (temIniciar) classeCor = 'pino-iniciar';

                let htmlObras = '';
                if (servicosDesteLocal.length > 0) {
                    servicosDesteLocal.forEach(s => {
                        let corBorda = 'var(--border)';
                        let textoStatus = '';
                        if(s.status === 'Parada') { corBorda = '#e03e3e'; textoStatus = '🔴 Parada'; }
                        if(s.status === 'Execucao') { corBorda = '#0f7b6c'; textoStatus = '🟢 Em Execução'; }
                        if(s.status === 'Iniciar') { corBorda = '#d9730d'; textoStatus = '🟠 A Iniciar'; }

                        htmlObras += `
                            <div class="popup-obra" style="border-left-color: ${corBorda};">
                                <strong style="display:block; font-size:0.85rem;">${s.servico}</strong>
                                <span style="font-size:0.75rem; color:var(--text-muted);">👷 ${s.encarregado} | ${textoStatus}</span>
                            </div>
                        `;
                    });
                } else {
                    htmlObras = `<div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); font-style: italic;">Nenhuma obra ativa.</div>`;
                }

                const htmlPopup = `
                    <div class="popup-gft">
                        <h3 class="popup-titulo">${local.nome}</h3>
                        <p class="popup-sistema">SISTEMA: ${local.sistema}</p>
                        ${htmlObras}
                    </div>
                `;

                const icone = L.divIcon({
                    className: `icone-pino ${classeCor}`,
                    iconSize: classeCor === 'pino-cinza' ? [12, 12] : [18, 18],
                    iconAnchor: classeCor === 'pino-cinza' ? [6, 6] : [9, 9]
                });

                L.marker([local.lat, local.lng], {icon: icone})
                    .bindPopup(htmlPopup, { offset: [0, -5] })
                    .addTo(marcadoresLayer);
                    
                contadorMostrados++;
            }

            document.getElementById('contadorLocais').innerText = `${contadorMostrados} locais visíveis`;
        }
    </script>
</body>
</html>
